name: Desktop Packaging

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  macos-package:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build macOS app bundle and DMG
        working-directory: crates/nooboard-desktop
        run: cargo packager --release --formats app,dmg --out-dir ../../target/release/bundle --binaries-dir ../../target/release

      - name: Upload macOS packages
        uses: actions/upload-artifact@v4
        with:
          name: nooboard-macos-packages
          path: target/release/bundle
          if-no-files-found: error

  windows-package:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build Windows installer
        working-directory: crates/nooboard-desktop
        run: cargo packager --release --formats nsis --out-dir ../../target/release/bundle --binaries-dir ../../target/release

      - name: Upload Windows packages
        uses: actions/upload-artifact@v4
        with:
          name: nooboard-windows-packages
          path: target/release/bundle
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - macos-package
      - windows-package
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download macOS packages
        uses: actions/download-artifact@v4
        with:
          name: nooboard-macos-packages
          path: dist/macos

      - name: Download Windows packages
        uses: actions/download-artifact@v4
        with:
          name: nooboard-windows-packages
          path: dist/windows

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if ! gh api "repos/$GH_REPO/releases/tags/$TAG_NAME" >/dev/null 2>&1; then
            gh api \
              --method POST \
              "repos/$GH_REPO/releases" \
              -f tag_name="$TAG_NAME" \
              -f name="$TAG_NAME" \
              -F generate_release_notes=true \
              -F draft=false \
              -F prerelease=false \
              >/dev/null
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          shopt -s nullglob
          assets=(dist/macos/*.dmg dist/windows/*.exe dist/windows/*.msi)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found"
            exit 1
          fi
          gh release upload "$TAG_NAME" "${assets[@]}" --repo "$GH_REPO" --clobber
