name: Windows Clipboard

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  windows-clipboard:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Test real Windows clipboard backend
        run: cargo test -p nooboard-platform-windows -- --test-threads=1

      - name: Link nooboard-app tests on Windows
        run: cargo test --no-run -p nooboard-app
