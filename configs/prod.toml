[meta]
config_version = 2
profile = "prod"

[identity]
noob_id_file = "/Users/zero/study/rust/nooboard/.data/noob_id"
device_id = "prod-device"

[app.clipboard]
recent_event_lookup_limit = 50

[storage]
db_root = "/Users/zero/study/rust/nooboard/.data"
retain_old_versions = 2

[storage.lifecycle]
history_window_days = 7
dedup_window_days = 14
gc_every_inserts = 200
gc_batch_size = 500

[sync.network]
enabled = true
mdns_enabled = true
listen_addr = "0.0.0.0:17890"
manual_peers = []

[sync.auth]
token = "change-me-in-prod"

[sync.file]
download_dir = "/Users/zero/study/rust/nooboard/.data/downloads"
max_file_size = 10737418240
chunk_size = 65536
active_downloads = 8
decision_timeout_ms = 30000
idle_timeout_ms = 15000

[sync.transport]
connect_timeout_ms = 5000
handshake_timeout_ms = 5000
ping_interval_ms = 5000
pong_timeout_ms = 15000
max_packet_size = 8388608
